<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Drohobych Map 2026</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #e2e8f0, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(42, 54, 66, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(42, 54, 66, 0); }
            100% { box-shadow: 0 0 0 0 rgba(42, 54, 66, 0); }
        }

        .container {
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .glass-panel {
            position: relative;
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.07);
            padding: 8px;
            margin-top: 50px;
            box-sizing: border-box;
        }

        .map-container {
            position: relative;
            width: 100%;
            border-radius: 18px;
            overflow: hidden;
        }

        .map-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .marker-link {
            position: absolute;
            display: block;
            z-index: 10;
            width: 44px;
            height: 44px;
            transform: translate(-50%, -100%);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .marker {
            position: absolute;
            width: 36px; 
            height: 36px;
            background: #2a3642; 
            border: 2px solid white;
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            top: 0;
            left: 4px;
            box-shadow: -2px 2px 8px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }

        .marker::after {
            content: '';
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        .marker-link:hover {
            transform: translate(-50%, -110%) scale(1.2);
            z-index: 20;
        }

        .marker-link:active {
            transform: translate(-50%, -100%) scale(0.9);
        }

        .home-btn {
            position: absolute;
            top: -45px;
            left: 5px;
            width: 40px;
            height: 40px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            z-index: 100;
            transition: all 0.3s ease;
        }

        .home-btn:hover {
            background: #2a3642;
            transform: translateY(-3px);
        }

        .home-btn:hover svg {
            stroke: white;
        }

        footer {
            width: 100%;
            padding: 30px;
            text-align: center;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
        }

        .footer-top { font-size: 14px; color: #555; font-weight: 600; }
        .credits { font-size: 11px; color: #999; margin-top: 5px; }

        @media (min-width: 768px) {
            .marker { width: 46px; height: 46px; }
            .marker-link { width: 54px; height: 54px; }
        }

        @media (max-width: 480px) {
            .marker { 
                width: 24px; 
                height: 24px; 
                border-width: 1.5px;
            }
            .marker-link { 
                width: 30px; 
                height: 30px; 
            }
            .marker::after { 
                width: 5px; 
                height: 5px; 
            }
            .marker {
                left: 3px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glass-panel">
            <div class="home-btn" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
            </div>

            <div class="map-container">
                <img src="6944.jpg" alt="Мапа Дрогобича">

                <a href="landau.html" class="marker-link" style="top: 30.9%; left: 4.2%;"><div class="marker" title="Вілла Ландау"></div></a>
                <a href="bianka.html" class="marker-link" style="top: 33.8%; left: 27%;"><div class="marker" title="Вілла Б'янки"></div></a>
                <a href="shulc.html" class="marker-link" style="top: 20.4%; left: 38.7%;"><div class="marker" title="Музей Кімната Б.Шульца"></div></a>
                <a href="bandera.html" class="marker-link" style="top: 45.5%; left: 58.4%;"><div class="marker" title="Парк імені С.Бандери"></div></a>
                <a href="drogobych12.html" class="marker-link" style="top: 73.4%; left: 44.5%;"><div class="marker" title="Юрія Дрогобича 12"></div></a>
                <a href="rynok10.html" class="marker-link" style="top: 65.6%; left: 67%;"><div class="marker" title="Площа Ринок 10"></div></a>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-top">© 2026 Дрогобич</div>
        <div class="credits">Винницький Іван & Волотко Людмила</div>
    </footer>

</body>
</html>

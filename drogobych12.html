<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Юрія Дрогобича 12 - Drohobych 2026</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #e2e8f0, #ffffff);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-panel {
            position: relative;
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .home-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .home-btn svg {
            transition: stroke 0.3s ease;
        }

        .home-btn:hover {
            background: #2a3642;
            transform: translateY(-3px) scale(1.1);
        }

        .home-btn:hover svg {
            stroke: white;
        }

        .content-img {
            width: 100%;
            height: auto;
            max-height: 65vh;
            object-fit: contain;
            border-radius: 20px;
            margin-top: 40px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1 {
            color: #2a3642;
            margin-top: 20px;
            font-size: 28px;
        }

        @media (max-width: 600px) {
            .glass-panel { padding: 20px; width: 95%; }
            h1 { font-size: 20px; }
            .home-btn { width: 40px; height: 40px; top: 15px; left: 15px; }
        }
    </style>
</head>
<body>

    <div class="glass-panel">
        <a href="index.html" class="home-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
            </svg>
        </a>

        <h1>вул. Юрія Дрогобича, 12</h1>
        
        <img src="drogobych12_photo.jpg" alt="Юрія Дрогобича 12" class="content-img">
    </div>

</body>
</html>
